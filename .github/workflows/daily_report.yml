name: 📊 BTC 策略日报

on:
  schedule:
    # 每天 UTC 时间 2:00 运行（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v5

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 📥 更新 BTC 数据
        run: node scripts/fetch_data.js

      - name: 📊 生成日报并发送邮件
        run: node scripts/daily_report.js
        env:
          QQ_MAIL_USER: ${{ secrets.QQ_MAIL_USER }}
          QQ_MAIL_PASS: ${{ secrets.QQ_MAIL_PASS }}
          QQ_MAIL_TO: ${{ secrets.QQ_MAIL_TO }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}

      # 数据每次运行都会重新拉取，无需提交到仓库
